<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barangay Cubacub - Digital Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
        
            <link rel="stylesheet" href="{{ url_for('static', filename='css/background.css') }}">
            <script src="{{ url_for('static', filename='js/background.js') }}"></script>
        
            <style>
        /* --- 1. RESET & CORE LAYOUT --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-light: #93c5fd;
            --tech-blue: #00d9ff;
            --tech-purple: #a855f7;
            --cyber-dark: #0d1222;
            --light: #f8fafc;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: var(--light);
            font-family: 'Exo 2', sans-serif;
            overflow: hidden;
            position: relative; 
        }

        /* --- 2. BACKGROUND EFFECTS --- */
        .tech-background {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden;
        }
        
        .grid-lines {
            position: absolute; width: 200%; height: 200%; top: -50%; left: -50%;
            background-image: linear-gradient(to right, rgba(59, 130, 246, 0.1) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(59, 130, 246, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 20s linear infinite;
            transform: perspective(500px) rotateX(60deg);
        }

        .floating-shapes { position: absolute; width: 100%; height: 100%; }
        .shape { position: absolute; border-radius: 50%; opacity: 0.5; filter: blur(40px); }
        .shape-1 { width: 300px; height: 300px; background: var(--tech-blue); top: 10%; left: 10%; animation: float 15s ease-in-out infinite; }
        .shape-2 { width: 400px; height: 400px; background: var(--tech-purple); bottom: 5%; right: 15%; animation: float 18s ease-in-out infinite reverse; }
        .particles { position: absolute; width: 100%; height: 100%; }
        .particle { position: absolute; background: rgba(255, 255, 255, 0.5); border-radius: 50%; }

        /* --- 3. MAIN CONTENT (LOGIN FORM) --- */
        .container {
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%); 
            width: 90%; max-width: 450px; 
            display: flex; flex-direction: column; align-items: center; 
            z-index: 10;
        }

        .header { text-align: center; margin-bottom: 40px; }

        .logo {
            display: flex; justify-content: center; align-items: center;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px);
            border-radius: 25px; margin: 0 auto 25px;
            border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }

        .logo-img { max-width: 80%; max-height: 80%; object-fit: contain; }

        .header h1 {
            font-family: 'Orbitron', sans-serif; font-size: 3.5rem; font-weight: 700; margin-bottom: 15px; letter-spacing: 2px;
            background: linear-gradient(to right, var(--tech-blue), var(--primary-light)); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; text-shadow: 0 5px 15px rgba(0, 217, 255, 0.3); position: relative; display: inline-block;
        }

        .header h1::after {
            content: ''; position: absolute; bottom: -10px; left: 10%; width: 80%; height: 3px;
            background: linear-gradient(to right, transparent, var(--tech-blue), transparent);
        }

        .tagline { font-size: 1.4rem; font-weight: 300; opacity: 0.9; margin-top: 20px; font-style: italic; letter-spacing: 1px; }

        .login-card {
            background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px);
            width: 100%; max-width: 450px; border-radius: 20px; padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s, box-shadow 0.3s; position: relative; overflow: hidden; z-index: 10;
            opacity: 1; 
        }

        .login-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--tech-blue), var(--tech-purple));
        }

        .form-title {
            text-align: center; margin-bottom: 30px; color: var(--tech-blue); font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem; font-weight: 500; letter-spacing: 1px;
        }

        .input-group { margin-bottom: 25px; position: relative; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--tech-blue); font-size: 18px; z-index: 2; }
        .input-group input {
            width: 100%; padding: 15px 15px 15px 45px; border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px;
            font-size: 16px; transition: all 0.3s ease; background: rgba(15, 23, 42, 0.5); color: white; font-family: 'Exo 2', sans-serif;
        }

        .login-btn {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--tech-blue) 0%, var(--tech-purple) 100%);
            color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3); font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px; position: relative; overflow: hidden;
        }

        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(168, 85, 247, 0.5); }

        /* --- 4. WELCOME SCREEN STYLES --- */
        .welcome-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--cyber-dark); 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 100; opacity: 0; pointer-events: none; 
            transition: opacity 0.7s cubic-bezier(0.65, 0.05, 0.36, 1);
        }

        .welcome-screen.active { opacity: 1; pointer-events: all; }
        .welcome-content { text-align: center; display: flex; flex-direction: column; align-items: center; }
        .welcome-text { font-family: 'Orbitron', sans-serif; font-size: 4em; font-weight: 700; margin-bottom: 5px; letter-spacing: 3px; opacity: 0; color: var(--tech-blue); }
        .signing-in-text { font-family: 'Exo 2', sans-serif; font-size: 1.5em; font-weight: 300; opacity: 0; margin-bottom: 60px; }

        .loading-spinner { width: 150px; height: 150px; position: relative; opacity: 0; transition: opacity 0.5s ease-out; }
        .loading-spinner::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%;
            border: 3px solid transparent; border-top-color: var(--tech-blue); border-left-color: var(--tech-purple);
            box-shadow: 0 0 20px var(--tech-blue), inset 0 0 10px var(--tech-purple); animation: dashRotate 3s linear infinite;
        }
        
        .clock-hand { position: absolute; top: 50%; left: 50%; transform-origin: 0% 0%; width: 50%; height: 2px; background: var(--tech-blue); box-shadow: 0 0 10px var(--tech-blue); }
        .clock-hand.h1 { transform: rotate(45deg); animation: handRotate 4s ease-in-out infinite alternate; }
        .clock-hand.h2 { transform: rotate(-45deg); animation: handRotate 4s ease-in-out infinite alternate reverse; background: var(--tech-purple); box-shadow: 0 0 10px var(--tech-purple); }

        .success-text { font-family: 'Orbitron', sans-serif; font-size: 2em; color: #10b981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.7); margin-top: 20px; opacity: 0; transition: opacity 0.5s ease-out; position: absolute; top: 50%; transform: translateY(-50%); }

        /* --- 5. ANIMATIONS --- */
        @keyframes gridMove { 0% { transform: perspective(500px) rotateX(60deg) translate(0, 0); } 100% { transform: perspective(500px) rotateX(60deg) translate(40px, 40px); } }
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-30px); } 100% { transform: translateY(0); } }
        @keyframes walkIn {
            0% { opacity: 0; transform: perspective(1000px) translateZ(800px) scale(3) translateY(50px) rotateX(90deg); filter: blur(25px); }
            100% { opacity: 1; transform: perspective(1000px) translateZ(0) scale(1) translateY(0) rotateX(0deg); filter: blur(0px); }
        }
        @keyframes dashRotate { 100% { transform: rotate(360deg); } }
        @keyframes handRotate { 0% { transform: rotate(45deg); } 100% { transform: rotate(135deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="tech-background">
        <div class="grid-lines"></div>
        <div class="floating-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
        </div>
        <div class="particles" id="particles"></div>
    </div>
    
    <div class="container" id="mainContainer">
        <div class="header">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/cubacub_logo_white.png') }}" alt="Logo" class="logo-img">
            </div>
            <h1>BARANGAY CUBACUB</h1>
            <p class="tagline">Connecting Community, Empowering People.</p>
        </div>

        <div class="login-card" id="loginCard">
            <h2 class="form-title">ACCESS PORTAL</h2>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" placeholder="Resident ID or Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="login-btn">LOGIN</button>
            </form>
        </div>
    </div>

    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-content">
            <div class="welcome-text" id="welcomeText">WELCOME</div>
            <div class="signing-in-text" id="signingInText">Authenticating Credentials...</div>
            <div style="position: relative; width: 300px; height: 150px; display: flex; justify-content: center; align-items: center; margin-bottom: 60px;">
                <div class="loading-spinner" id="loadingSpinner">
                    <div class="clock-hand h1"></div>
                    <div class="clock-hand h2"></div>
                </div>
                <div class="success-text" id="successText">LOGIN SUCCESSFUL</div>
            </div>
        </div>
    </div>
    
    <script>
        window.addEventListener('load', () => {
            localStorage.clear();
            createParticles();
        });

        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                p.style.width = p.style.height = Math.random() * 3 + 1 + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = Math.random() * 100 + '%';
                p.style.animation = `fadeIn ${Math.random() * 5 + 2}s infinite alternate`;
                container.appendChild(p);
            }
        }

        function restartAnimation(element, animationName) {
            element.style.opacity = '0';
            element.style.animation = 'none';
            void element.offsetWidth; 
            element.style.animation = animationName;
        }

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const username = document.getElementById('username').value;
            localStorage.setItem('currentUser', username);

            document.getElementById('mainContainer').style.opacity = '0';

            setTimeout(() => {
                const screen = document.getElementById('welcomeScreen');
                screen.classList.add('active');
                
                restartAnimation(document.getElementById('welcomeText'), 'walkIn 1.5s forwards');
                
                const sit = document.getElementById('signingInText');
                const ls = document.getElementById('loadingSpinner');
                const st = document.getElementById('successText');

                setTimeout(() => { sit.style.opacity = '1'; ls.style.opacity = '1'; }, 1000);
                setTimeout(() => { sit.textContent = "Verifying Credentials..."; }, 2500);
                setTimeout(() => { sit.textContent = "Access Granted."; }, 4000);
                setTimeout(() => {
                    ls.style.opacity = '0';
                    sit.style.opacity = '0';
                    st.style.opacity = '1';
                }, 5000);

                // REDIRECT TO DASHBOARD
                setTimeout(() => {
                    window.location.href = "{{ url_for('dashboard') }}";
                }, 6500);

            }, 500);
        });
    </script>
</body>
</html>
